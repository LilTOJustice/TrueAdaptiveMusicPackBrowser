name: Publish mod

on:
  push:
    branches:
      - 'versions/*.*'
  workflow_dispatch:

env:
  JAVA_VERSION: 21
  MODRINTH_TOKEN: ${{ secrets.PUBLISH_MODRINTH_TOKEN }}

permissions:
  contents: write

jobs:
  determine-versions:
    runs-on: ubuntu-latest
    outputs:
      minecraft_version: ${{ steps.minecraft.outputs.minecraft_version }}
      mod_version: ${{ steps.mod.outputs.mod_version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true
      - id: minecraft
        name: Get minecraft version
        run: |
          grep 'minecraft_version=.*' gradle.properties >> "$GITHUB_OUTPUT"
      - id: mod
        name: Get mod version
        run: |
          grep 'mod_version=.*' gradle.properties >> "$GITHUB_OUTPUT"
  build-and-publish:
    if: contains(github.ref_name, 'versions/') # Is version branch
    runs-on: ubuntu-latest
    needs: determine-versions
    steps:
      - name: Check Environment Variables
        run: env

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v2
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Make Gradle Wrapper Executable
        if: ${{ runner.os != 'Windows' }}
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Publish (CurseForge/Modrinth/GitHub)
        env:
          MINECRAFT_VERSION: ${{needs.determine-versions.outputs.minecraft_version}}
          MOD_VERSION: ${{needs.determine-versions.outputs.mod_version}}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          files: |
            build/libs/!(*-@(dev|sources|javadoc)).jar

          modrinth-id: f1XVaOcT
          modrinth-token: "${{env.MODRINTH_TOKEN}}"
          
          name: "True Adaptive Music Pack Browser ${{env.MOD_VERSION}} for Minecraft ${{env.MINECRAFT_VERSION}}"
          version: "${{env.MOD_VERSION}}+${{env.MINECRAFT_VERSION}}"
          version-type: release
          changelog-file: CHANGELOG.md
          
          game-versions: "${{env.MINECRAFT_VERSION}}"
          java: "${{env.JAVA_VERSION}}"
